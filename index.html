<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Equipes de Fibra</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS & JS for Interactive Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Firebase JS SDK (Compat version for pure Vanilla JS without bundlers) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Fiber<span class="highlight">Planner</span></h2>
            </div>
            
            <div class="sidebar-section">
                <button onclick="toggleSection('mainNavList', 'mainToggleIcon')" style="width: 100%; display: flex; justify-content: space-between; align-items: center; background: none; border: none; cursor: pointer; padding: 0.5rem 0.5rem; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='var(--bg-main)'" onmouseout="this.style.background='transparent'">
                    <span class="section-title" style="margin-bottom: 0; padding-left: 0.3rem;">PRINCIPAL</span>
                    <svg id="mainToggleIcon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--text-muted); transition: transform 0.2s;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <nav class="sidebar-nav" id="mainNavList" style="margin-top: 0.5rem; display: flex; flex-direction: column; overflow: hidden; transition: max-height 0.3s ease; max-height: 1000px;">
                    <button class="nav-item active" id="navGeral" onclick="switchView('geral', this)">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Visão Geral
                    </button>
                </nav>
            </div>
            
            <div class="sidebar-section">
                <button onclick="toggleSection('toolsNavList', 'toolsToggleIcon')" style="width: 100%; display: flex; justify-content: space-between; align-items: center; background: none; border: none; cursor: pointer; padding: 0.5rem 0.5rem; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='var(--bg-main)'" onmouseout="this.style.background='transparent'">
                    <span class="section-title" style="margin-bottom: 0; padding-left: 0.3rem;">FERRAMENTAS</span>
                    <svg id="toolsToggleIcon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--text-muted); transition: transform 0.2s;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <nav class="sidebar-nav" id="toolsNavList" style="margin-top: 0.5rem; display: flex; flex-direction: column; overflow: hidden; transition: max-height 0.3s ease; max-height: 1000px;">
                    <button class="nav-item" onclick="openTeamManager()" style="justify-content:center; border:1px solid var(--primary); background:var(--bg-main); color:var(--primary); font-weight:600; border-radius:8px; padding:10px; margin-bottom:5px;">
                        ⚙️ Gerenciar Equipes
                    </button>
                    <button class="nav-item" onclick="openManagerManager()" style="justify-content:center; border:1px solid var(--primary); background:var(--bg-main); color:var(--primary); font-weight:600; border-radius:8px; padding:10px; margin-bottom:5px;">
                        👔 Gerenciar Gestores
                    </button>
                    <button class="nav-item" onclick="exportToCSV()" style="justify-content:center; border:1px solid var(--border-color); background:var(--bg-main); font-weight:600; border-radius:8px; padding:10px; margin-bottom:5px;" title="Baixar relatório completo em Excel">
                        📥 Exportar Excel
                    </button>
                    <!-- Link Externo Rastreador de Carros -->
                    <a href="https://painel.cobli.co/home" target="_blank" class="nav-item" style="text-decoration: none; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-main); justify-content:center; padding:10px;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Rastreador (Cobli)
                    </a>
                </nav>
            </div>
            
            <div class="sidebar-section">
                <button onclick="toggleSection('teamsNavList', 'teamsToggleIcon')" style="width: 100%; display: flex; justify-content: space-between; align-items: center; background: none; border: none; cursor: pointer; padding: 0.5rem 0.5rem; border-radius: 6px; transition: background 0.2s;" onmouseover="this.style.background='var(--bg-main)'" onmouseout="this.style.background='transparent'">
                    <span class="section-title" style="margin-bottom: 0; padding-left: 0.3rem;">EQUIPES DE CAMPO</span>
                    <svg id="teamsToggleIcon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--text-muted); transition: transform 0.2s; transform: rotate(-180deg);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <nav class="sidebar-nav" id="teamsNavList" style="margin-top: 0.5rem; display: none; flex-direction: column; overflow: hidden; transition: max-height 0.3s ease; max-height: 0px;">
                    <!-- Teams injected dynamically -->
                </nav>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-secondary w-full" style="margin-bottom: 1rem;" onclick="toggleTheme()">🌓 Alternar Tema</button>
            </div>
        </aside>

        <!-- Main Dashboard Workspace -->
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <h1 id="viewTitle">Visão Geral</h1>
                    <p class="subtitle" id="viewSubtitle">Cronograma de todas as equipes</p>
                </div>
                <div class="topbar-right" style="display: flex; gap: 1rem; align-items: center;">
                    <select id="statusFilter" onchange="changeFilter(this.value)" style="padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.9rem; font-weight: 500; cursor: pointer; background: var(--bg-card);">
                        <option value="all">Filtro: Todos</option>
                        <option value="pending">🟡 Pendentes</option>
                        <option value="progress">🔵 Em Andamento</option>
                        <option value="done">🟢 Concluídos</option>
                    </select>

                    <div class="view-toggles" style="display: flex; background: var(--bg-main); border-radius: 8px; padding: 4px; border: 1px solid var(--border-color);">
                        <button class="toggle-btn active" id="btnListView" onclick="switchDisplayMode('list')">📄 Lista</button>
                        <button class="toggle-btn" id="btnCalendarView" onclick="switchDisplayMode('calendar')">📅 Calendário</button>
                        <button class="toggle-btn" id="btnMapView" onclick="switchDisplayMode('map')">🌍 Mapa</button>
                        <button class="toggle-btn" id="btnDashView" onclick="switchDisplayMode('dash')">📊 Dashboard</button>
                    </div>

                    <button class="btn btn-primary" onclick="openNewTaskModal()" style="padding: 0.5rem 1rem; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right: 0.3rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Nova Demanda
                    </button>
                </div>
            </header>
            
            <!-- Dashboard Views -->
            <div class="view-container" id="viewContainer">
                <!-- Data injected dynamically via JS based on selected tab -->
            </div>
        </main>
    </div>

    <!-- Overlay Modal: Nova Demanda -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Agendar Nova Demanda</h3>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <form id="taskForm" onsubmit="handleTaskSubmit(event)">
                    <!-- Hidden field acting as ID if editing -->
                    <input type="hidden" id="taskId">
                    
                    <div class="form-group row">
                        <div class="col">
                            <label>Equipe Responsável</label>
                            <select id="taskTeam" required>
                                <!-- Options injected -->
                            </select>
                        </div>
                        <div class="col">
                            <label>Gestor Responsável</label>
                            <select id="taskManager" required>
                                <option value="" disabled selected>Carregando gestores...</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Serviço</label>
                        <select id="taskType" required>
                            <option value="" disabled selected>Selecione o Serviço</option>
                            <option value="Rompimento de fibra">Rompimento de fibra</option>
                            <option value="Manutenção de cto">Manutenção de cto</option>
                            <option value="Manutenção de bakcbone">Manutenção de bakcbone</option>
                            <option value="Virada de sinal">Virada de sinal</option>
                            <option value="Montagem de CTO">Montagem de CTO</option>
                            <option value="Montagem de DIO">Montagem de DIO</option>
                            <option value="Caixa sem sinal">Caixa sem sinal</option>
                            <option value="Fibra atenuada">Fibra atenuada</option>
                            <option value="Outros">Outros...</option>
                        </select>
                    </div>
                    <div class="form-group row">
                        <div class="col">
                            <label>Data de Início</label>
                            <input type="date" id="taskDate" required>
                        </div>
                        <div class="col">
                            <label>Data de Término (Opcional)</label>
                            <input type="date" id="taskDateEnd" title="Deixe vazio se for apenas um dia.">
                        </div>
                    </div>
                    <div class="form-group row">
                        <div class="col">
                            <label>Horário Início (Opcional)</label>
                            <input type="time" id="taskTimeStart">
                        </div>
                        <div class="col">
                            <label>Horário Término (Opcional)</label>
                            <input type="time" id="taskTimeEnd">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Local / Endereço</label>
                        <input type="text" id="taskLocation" placeholder="Ex: Rua das Flores, 123" required>
                    </div>
                    
                    <div class="form-group row">
                        <div class="col">
                            <label>Coordenadas (Opcional)</label>
                            <input type="text" id="taskCoordinates" placeholder="Ex: -23.5505, -46.6333">
                        </div>
                        <div class="col">
                            <label>Telefone do Cliente (Opcional)</label>
                            <input type="text" id="taskContact" placeholder="Ex: (11) 99999-9999">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Descrição do Serviço</label>
                        <textarea id="taskDescription" placeholder="Ex: Lançamento de cabo drop, fusão da CTO..." rows="3" required></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Demanda</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Overlay Modal: Detalhes da Demanda (Visualização) -->
    <div class="modal-overlay" id="detailsModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Detalhes da Demanda</h3>
                <button class="close-btn" onclick="closeDetailsModal()">✕</button>
            </div>
            <div class="modal-body" id="detailsModalBody">
                <!-- Informações injetadas via JS -->
            </div>
        </div>
    </div>

    <!-- Overlay Modal: Resumo do Dia (Calendário) -->
    <div class="modal-overlay" id="dayModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="dayModalTitle">Agendamentos do Dia</h3>
                <button class="close-btn" onclick="closeDayModal()">✕</button>
            </div>
            <div class="modal-body">
                <button class="btn btn-primary w-full" style="margin-bottom: 1rem;" onclick="openNewTaskModal(document.getElementById('dayModal').getAttribute('data-current-date'))">
                    + Adicionar Demanda Neste Dia
                </button>
                <div id="dayModalBody" style="max-height: 65vh; overflow-y: auto; padding-right: 0.5rem;">
                    <!-- Cards injetados via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Teams Manager Modal -->
    <div class="modal-overlay" id="teamManagerModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Gerenciar Equipes</h3>
                <button class="close-btn" onclick="closeTeamManager()">✕</button>
            </div>
            <div class="modal-body">
                <button class="btn btn-primary w-full" style="margin-bottom: 1.5rem;" onclick="openTeamForm()">+ Adicionar Nova Equipe</button>
                <div id="teamsListContainer" style="display: flex; flex-direction: column; gap: 0.6rem; max-height: 400px; overflow-y: auto; padding-right: 0.5rem;">
                    <!-- JS injected -->
                </div>
            </div>
        </div>
    </div>

    <!-- Team Form Modal -->
    <div class="modal-overlay" id="teamFormModal" style="z-index: 1010;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="teamFormTitle">Nova Equipe</h3>
                <button class="close-btn" onclick="closeTeamForm()">✕</button>
            </div>
            <div class="modal-body">
                <form id="teamForm" onsubmit="handleTeamSubmit(event)">
                    <input type="hidden" id="editTeamId">
                    <div class="form-group">
                        <label>Nome do Técnico / Equipe</label>
                        <input type="text" id="teamNameInput" required placeholder="Ex: João e Maria">
                    </div>
                    <div class="form-group">
                        <label>Grupo / Especialidade</label>
                        <input type="text" id="teamGroupInput" required placeholder="Ex: Linheiros - Norte">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeTeamForm()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Equipe</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Managers Manager Modal -->
    <div class="modal-overlay" id="managerManagerModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Gerenciar Gestores</h3>
                <button class="close-btn" onclick="closeManagerManager()">✕</button>
            </div>
            <div class="modal-body">
                <button class="btn btn-primary w-full" style="margin-bottom: 1.5rem;" onclick="openManagerForm()">+ Adicionar Novo Gestor</button>
                <div id="managersListContainer" style="display: flex; flex-direction: column; gap: 0.6rem; max-height: 400px; overflow-y: auto; padding-right: 0.5rem;">
                </div>
            </div>
        </div>
    </div>

    <!-- Manager Form Modal -->
    <div class="modal-overlay" id="managerFormModal" style="z-index: 1010;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="managerFormTitle">Novo Gestor</h3>
                <button class="close-btn" onclick="closeManagerForm()">✕</button>
            </div>
            <div class="modal-body">
                <form id="managerForm" onsubmit="handleManagerSubmit(event)">
                    <input type="hidden" id="editManagerId">
                    <div class="form-group">
                        <label>Nome do Gestor Responsável</label>
                        <input type="text" id="managerNameInput" required placeholder="Ex: João da Silva">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeManagerForm()">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Gestor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
